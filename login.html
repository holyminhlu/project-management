<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ProjectFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <style>
    /* ─── CSS Reset ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* ─── Design Tokens ──────────────────────────────────── */
    :root {
      --bg:          #0d0f14;
      --surface:     #13161e;
      --surface-2:   #1b1f2a;
      --border:      rgba(255,255,255,0.07);
      --border-focus: rgba(99,179,237,0.6);

      --text-primary:   #f0f2f7;
      --text-secondary: #8892a6;
      --text-muted:     #4a5266;

      --accent:      #4f9eff;
      --accent-glow: rgba(79,158,255,0.22);
      --accent-dark: #2f7de8;

      --error:       #ff5e7d;
      --error-bg:    rgba(255,94,125,0.1);

      --success:     #34d399;

      --radius:      14px;
      --radius-sm:   9px;
      --shadow-card: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px var(--border);
      --transition:  0.2s cubic-bezier(0.4,0,0.2,1);
    }

    /* ─── Light theme override ───────────────────────────── */
    @media (prefers-color-scheme: light) {
      :root {
        --bg:          #f0f4fb;
        --surface:     #ffffff;
        --surface-2:   #f5f8ff;
        --border:      rgba(0,0,0,0.08);
        --border-focus: rgba(47,125,232,0.5);

        --text-primary:   #0d0f14;
        --text-secondary: #5a6480;
        --text-muted:     #a0aabf;

        --accent:      #2f7de8;
        --accent-glow: rgba(47,125,232,0.14);
        --accent-dark: #1a62cc;

        --error:       #e8335a;
        --error-bg:    rgba(232,51,90,0.08);

        --shadow-card: 0 24px 60px rgba(0,0,0,0.12), 0 0 0 1px var(--border);
      }
    }

    /* ─── Base ───────────────────────────────────────────── */
    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Animated background grid ───────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 40%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing orbs */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 500px at 20% 10%, rgba(79,158,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 500px 400px at 80% 90%, rgba(130,80,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Layout wrapper ─────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
    }

    /* ─── Card ───────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 44px 40px 40px;
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Logo / brand ────────────────────────────────────── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, #7c5cf7 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px var(--accent-glow);
      flex-shrink: 0;
    }

    .brand-icon svg { width: 20px; height: 20px; }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    /* ─── Heading ─────────────────────────────────────────── */
    .heading {
      margin-bottom: 28px;
    }

    .heading h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 6px;
      animation: fadeUp 0.5s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .heading p {
      font-size: 14px;
      color: var(--text-secondary);
      animation: fadeUp 0.5s 0.18s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Form ────────────────────────────────────────────── */
    .form { display: flex; flex-direction: column; gap: 18px; }

    /* Field group */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    .field:nth-child(1) { animation-delay: 0.22s; }
    .field:nth-child(2) { animation-delay: 0.28s; }

    /* Label */
    .field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }

    /* Input wrapper (for icon + input) */
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    /* Leading icon */
    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      display: flex;
      pointer-events: none;
      transition: color var(--transition);
    }

    /* Input element */
    .input-wrap input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 14.5px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      -webkit-appearance: none;
    }

    /* Password right padding to avoid toggle overlap */
    .input-wrap input[type="password"],
    .input-wrap input[data-type="password"] {
      padding-right: 46px;
    }

    .input-wrap input::placeholder {
      color: var(--text-muted);
    }

    /* Focus state */
    .input-wrap input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: var(--surface);
    }

    .input-wrap input:focus + .input-icon,
    .input-wrap:focus-within .input-icon {
      color: var(--accent);
    }

    /* Error state */
    .field.has-error .input-wrap input {
      border-color: var(--error);
      box-shadow: 0 0 0 3px var(--error-bg);
    }

    /* Show/hide toggle */
    .toggle-pw {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      padding: 4px;
      border-radius: 6px;
      transition: color var(--transition), background var(--transition);
    }
    .toggle-pw:hover { color: var(--text-primary); background: var(--border); }
    .toggle-pw:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    /* Error message */
    .error-msg {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--error);
      padding: 6px 10px;
      background: var(--error-bg);
      border-radius: 6px;
      animation: shakeIn 0.3s ease;
    }

    .field.has-error .error-msg { display: flex; }

    @keyframes shakeIn {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-5px); }
      50%  { transform: translateX(4px); }
      80%  { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }

    /* ─── Forgot password ────────────────────────────────── */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
      animation: fadeUp 0.5s 0.32s cubic-bezier(0.22,1,0.36,1) both;
    }

    .link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color var(--transition), opacity var(--transition);
      border-radius: 4px;
    }
    .link:hover { opacity: 0.75; }
    .link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ─── Primary button ──────────────────────────────────── */
    .btn-primary {
      position: relative;
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      overflow: hidden;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 20px var(--accent-glow);
      animation: fadeUp 0.5s 0.36s cubic-bezier(0.22,1,0.36,1) both;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      box-shadow: 0 6px 28px var(--accent-glow);
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: scale(0.98) translateY(0); }

    .btn-primary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* Ripple effect */
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }

    /* Loading spinner inside button */
    .btn-primary .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .btn-primary.loading .btn-label { display: none; }
    .btn-primary.loading .spinner   { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Divider ────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
      animation: fadeUp 0.5s 0.42s cubic-bezier(0.22,1,0.36,1) both;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Sign-up nudge ───────────────────────────────────── */
    .signup-row {
      text-align: center;
      font-size: 13.5px;
      color: var(--text-secondary);
      animation: fadeUp 0.5s 0.46s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ─── Success toast ───────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid rgba(52,211,153,0.35);
      color: var(--success);
      font-size: 13.5px;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 40px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Responsive ──────────────────────────────────────── */
    @media (max-width: 460px) {
      .card { padding: 36px 24px 30px; }
    }
  </style>
</head>

<body>
  <div class="page" role="main">

    <!-- ── Card ── -->
    <div class="card" role="region" aria-label="Login form">

      <!-- Brand -->
      <div class="brand" aria-hidden="true">
        <div class="brand-icon">
          <!-- Grid / project icon -->
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="7" height="7" rx="2" fill="white" fill-opacity="0.9"/>
            <rect x="11" y="2" width="7" height="7" rx="2" fill="white" fill-opacity="0.55"/>
            <rect x="2" y="11" width="7" height="7" rx="2" fill="white" fill-opacity="0.55"/>
            <rect x="11" y="11" width="7" height="7" rx="2" fill="white" fill-opacity="0.9"/>
          </svg>
        </div>
        <span class="brand-name">ProjectFlow</span>
      </div>

      <!-- Heading -->
      <div class="heading">
        <h1>Welcome back</h1>
        <p>Sign in to continue to your workspace</p>
      </div>

      <!-- Form -->
      <form class="form" id="loginForm" novalidate aria-label="Sign in">

        <!-- Email field -->
        <div class="field" id="emailField">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <!-- Mail icon -->
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M1.5 5.5L8 9.5L14.5 5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="Enter your email"
              aria-required="true"
              aria-describedby="emailError"
              aria-invalid="false"
            />
          </div>
          <span class="error-msg" id="emailError" role="alert" aria-live="polite">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
              <circle cx="6.5" cy="6.5" r="6" stroke="currentColor" stroke-width="1.3"/>
              <line x1="6.5" y1="4" x2="6.5" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="6.5" cy="9.5" r="0.75" fill="currentColor"/>
            </svg>
            <span id="emailErrorText"></span>
          </span>
        </div>

        <!-- Password field -->
        <div class="field" id="passwordField">
          <label for="password">Password</label>
          <div class="input-wrap">
            <!-- Lock icon -->
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="3" y="7" width="10" height="7.5" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <circle cx="8" cy="10.5" r="1" fill="currentColor"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              aria-required="true"
              aria-describedby="passwordError"
              aria-invalid="false"
              data-type="password"
            />
            <!-- Show/hide toggle -->
            <button
              type="button"
              class="toggle-pw"
              id="togglePw"
              aria-label="Show password"
              aria-pressed="false"
              title="Toggle password visibility"
            >
              <!-- Eye icon (visible = password shown) -->
              <svg id="iconEye" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M1 9s3-5.5 8-5.5S17 9 17 9s-3 5.5-8 5.5S1 9 1 9z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <circle cx="9" cy="9" r="2.2" stroke="currentColor" stroke-width="1.4"/>
              </svg>
              <!-- Eye-off icon (hidden = password concealed) -->
              <svg id="iconEyeOff" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true" style="display:none">
                <path d="M2 2l14 14M7.4 7.5A2.2 2.2 0 0011.5 11.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M5 5.3C3 6.6 1.5 9 1.5 9S4.5 14.5 9 14.5c1.4 0 2.7-.4 3.8-1.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M13.5 12.3C15.2 10.9 16.5 9 16.5 9S13.5 3.5 9 3.5c-.7 0-1.4.1-2 .3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="passwordError" role="alert" aria-live="polite">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
              <circle cx="6.5" cy="6.5" r="6" stroke="currentColor" stroke-width="1.3"/>
              <line x1="6.5" y1="4" x2="6.5" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="6.5" cy="9.5" r="0.75" fill="currentColor"/>
            </svg>
            <span id="passwordErrorText"></span>
          </span>
        </div>

        <!-- Forgot password -->
        <div class="forgot-row">
          <a href="#" class="link" id="forgotLink" aria-label="Reset your password">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="btn-primary"
          id="loginBtn"
          aria-label="Sign in to ProjectFlow"
        >
          <span class="btn-label">Sign in</span>
          <div class="spinner" aria-hidden="true"></div>
        </button>

      </form>

      <!-- Divider + sign-up nudge -->
      <div style="margin-top: 24px; display: flex; flex-direction: column; gap: 16px;">
        <div class="divider">or</div>
        <p class="signup-row">
          Don't have an account?&nbsp;
          <a href="#" class="link" aria-label="Create a new account">Create one free →</a>
        </p>
      </div>

    </div><!-- /card -->
  </div><!-- /page -->

  <!-- Success toast -->
  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <circle cx="8" cy="8" r="7" stroke="#34d399" stroke-width="1.5"/>
      <path d="M5 8l2.2 2.2L11 6" stroke="#34d399" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Login successful! Redirecting…
  </div>

  <!-- ─── JavaScript ──────────────────────────────────────── -->
  <script>
    'use strict';

    /* ── DOM refs ─────────────────────────────────────────── */
    const form         = document.getElementById('loginForm');
    const emailInput   = document.getElementById('email');
    const passwordInput= document.getElementById('password');
    const emailField   = document.getElementById('emailField');
    const passwordField= document.getElementById('passwordField');
    const emailErrTxt  = document.getElementById('emailErrorText');
    const passErrTxt   = document.getElementById('passwordErrorText');
    const togglePwBtn  = document.getElementById('togglePw');
    const iconEye      = document.getElementById('iconEye');
    const iconEyeOff   = document.getElementById('iconEyeOff');
    const loginBtn     = document.getElementById('loginBtn');
    const toast        = document.getElementById('toast');
    const forgotLink   = document.getElementById('forgotLink');

    /* ── Validation helpers ───────────────────────────────── */
    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

    /**
     * Sets or clears the error state on a field.
     * @param {HTMLElement} field     - The .field wrapper
     * @param {HTMLElement} errSpan  - The error text span
     * @param {string|null} message  - Error text, or null to clear
     */
    function setError(field, errSpan, inputEl, message) {
      if (message) {
        field.classList.add('has-error');
        errSpan.textContent = message;
        inputEl.setAttribute('aria-invalid', 'true');
      } else {
        field.classList.remove('has-error');
        errSpan.textContent = '';
        inputEl.setAttribute('aria-invalid', 'false');
      }
    }

    /** Validate the email field; return true if valid */
    function validateEmail() {
      const val = emailInput.value.trim();
      if (!val) {
        setError(emailField, emailErrTxt, emailInput, 'Email address is required.');
        return false;
      }
      if (!EMAIL_RE.test(val)) {
        setError(emailField, emailErrTxt, emailInput, 'Please enter a valid email address.');
        return false;
      }
      setError(emailField, emailErrTxt, emailInput, null);
      return true;
    }

    /** Validate the password field; return true if valid */
    function validatePassword() {
      const val = passwordInput.value;
      if (!val) {
        setError(passwordField, passErrTxt, passwordInput, 'Password is required.');
        return false;
      }
      if (val.length < 6) {
        setError(passwordField, passErrTxt, passwordInput, 'Password must be at least 6 characters.');
        return false;
      }
      setError(passwordField, passErrTxt, passwordInput, null);
      return true;
    }

    /* ── Real-time validation (on blur) ───────────────────── */
    emailInput.addEventListener('blur',    validateEmail);
    passwordInput.addEventListener('blur', validatePassword);

    /* Clear errors on input */
    emailInput.addEventListener('input', () => {
      if (emailField.classList.contains('has-error')) validateEmail();
    });
    passwordInput.addEventListener('input', () => {
      if (passwordField.classList.contains('has-error')) validatePassword();
    });

    /* ── Password show/hide ───────────────────────────────── */
    togglePwBtn.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';

      /* Toggle input type */
      passwordInput.type = isHidden ? 'text' : 'password';

      /* Swap icons */
      iconEye.style.display    = isHidden ? 'none'  : '';
      iconEyeOff.style.display = isHidden ? ''      : 'none';

      /* Update aria */
      togglePwBtn.setAttribute('aria-label',   isHidden ? 'Hide password' : 'Show password');
      togglePwBtn.setAttribute('aria-pressed',  isHidden ? 'true' : 'false');
    });

    /* ── Toast helper ─────────────────────────────────────── */
    function showToast() {
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3200);
    }

    /* ── Form submit ──────────────────────────────────────── */
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      /* Run both validators; stop if either fails */
      const emailOk    = validateEmail();
      const passwordOk = validatePassword();
      if (!emailOk || !passwordOk) {
        /* Focus first invalid field */
        if (!emailOk) emailInput.focus();
        else            passwordInput.focus();
        return;
      }

      /* Simulate async login request */
      loginBtn.classList.add('loading');
      loginBtn.disabled = true;

      try {
        await fakeLoginRequest({
          email:    emailInput.value.trim(),
          password: passwordInput.value,
        });

        /* ── Success path ── */
        showToast();

        /* Reset loading after toast */
        setTimeout(() => {
          loginBtn.classList.remove('loading');
          loginBtn.disabled = false;
          /* In production: window.location.href = '/dashboard'; */
        }, 3000);

      } catch (err) {
        /* ── Error path (wrong credentials, server error, etc.) ── */
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
        setError(emailField,    emailErrTxt,  emailInput,    null);
        setError(passwordField, passErrTxt, passwordInput, err.message || 'Invalid email or password. Please try again.');
        passwordInput.focus();
      }
    });

    /**
     * Simulated async login – replace with real fetch() call.
     * Resolves on success, rejects with an Error on failure.
     */
    function fakeLoginRequest({ email, password }) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          /* Demo: accept any valid-looking credentials */
          if (email && password.length >= 6) {
            resolve({ token: 'demo-jwt-token' });
          } else {
            reject(new Error('Invalid email or password. Please try again.'));
          }
        }, 1600);
      });
    }

    /* ── Forgot password ──────────────────────────────────── */
    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      /* In production: navigate to /forgot-password */
      alert('Password reset link will be sent to your email.\n(Integrate your reset flow here.)');
    });

    /* ── Keyboard: submit on Enter inside any field ──────── */
    [emailInput, passwordInput].forEach(el => {
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') form.requestSubmit();
      });
    });
  </script>
</body>
